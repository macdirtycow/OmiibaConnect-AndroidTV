name: Android TV CI

on:
  push:
    branches: [main, master, "cursor/**"]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Accept licenses
        run: yes | sdkmanager --licenses || true
      - name: Install SDK packages
        run: |
          sdkmanager --update
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "cmake;3.22.1"
      - name: Pin NDK version (match Gradle ndkVersion)
        run: sdkmanager "ndk;26.1.10909125"
      - name: Assemble release APK
        run: ./gradlew :app:assembleRelease --stacktrace
      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
      - name: Publish GitHub pre-release (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          NOTES="Pre-release for sideload on Android TV (Google TV, etc.). Pair Sony headphones in system Bluetooth first. See docs/android-tv-bluetooth.md and docs/RELEASE.md."
          TAG=v0.1.13-pre
          TITLE="Omiiba Connect TV 0.1.13 (pre-release)"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK" --clobber
          else
            gh release create "$TAG" "$APK" \
              --title "$TITLE" \
              --prerelease \
              --notes "$NOTES"
          fi
